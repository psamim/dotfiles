[filetype]
rules = [
	# Media
	{ mime = "image/*", fg = "#f9e2af" },
	{ mime = "{audio,video}/*", fg = "#f5c2e7" },

	# Archives
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f38ba8" },

	# Documents
	{ mime = "application/{pdf,doc,rtf}", fg = "#89dceb" },

	# Virtual file system
	{ mime = "vfs/{absent,stale}", fg = "#45475a" },

	# Special file
	{ url = "*", is = "orphan", bg = "#f38ba8" },
	{ url = "*", is = "exec"  , fg = "#a6e3a1" },

	# Dummy file
	{ url = "*", is = "dummy", bg = "#f38ba8" },
	{ url = "*/", is = "dummy", bg = "#f38ba8" },

	# Fallback
	{ url = "*/", fg = "#89b4fa" },
]

